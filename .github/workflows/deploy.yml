name: Simple Deploy
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm install
        working-directory: COOLTRACKVISION-main/Vision-Control
      - name: Build
        run: npm run build
        working-directory: COOLTRACKVISION-main/Vision-Control
      - name: Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: COOLTRACKVISION-main/Vision-Control/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v4
