# Simple workflow for deploying static content to GitHub Pages из папки client
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: List repository structure  # Диагностика структуры
        run: |
          echo "=== Структура репозитория ==="
          ls -la
          echo "=== Поиск index.html ==="
          find . -name "index.html" -type f
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Prepare client folder  # 🔥 ИСПРАВЛЯЕМ ПРОБЛЕМУ
        run: |
          echo "=== Проверяем папку client ==="
          if [ -d "client" ]; then
            echo "✓ Папка client найдена"
            ls -la client/
          else
            echo "✗ Папки client нет, ищем index.html..."
            if [ -f "index.html" ]; then
              echo "✓ index.html в корне, перемещаем в client/"
              mkdir -p client
              mv index.html client/
              mv client/* . || true  # Копируем содержимое если есть
            else
              echo "✗ index.html не найден нигде!"
              exit 1
            fi
          fi
          
          echo "=== Финальная структура client/ ==="
          ls -la client/ || ls -la .
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Теперь точно загрузит содержимое client
          path: 'client'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
